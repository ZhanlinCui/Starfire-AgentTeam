name: Reno Stars Agent Team
description: >
  AI agent team for Reno Stars Construction Inc — a full-service renovation company
  in Greater Vancouver. Manages website, marketing, sales, accounting, and research
  operations through coordinated agent teams.

defaults:
  runtime: claude-code
  tier: 2
  initial_prompt: |
    You just started. Set up silently — do NOT contact other agents yet.
    1. Read your system prompt at /configs/system-prompt.md
    2. Read /workspace/CLAUDE.md if it exists to understand the project
    3. Run: git log --oneline -5 in /workspace to see recent changes (if applicable)
    4. Use commit_memory to save a brief summary of your role and current state
    5. You are now ready. Wait for tasks from your manager.

workspaces:
  # ─── BUSINESS INTELLIGENCE (Root — the brain) ───────────────────
  - name: Business Intelligence
    role: >
      Central AI brain for Reno Stars. Receives tasks from the CEO,
      delegates to team leaders and coordinator, synthesizes results.
    tier: 3
    model: opus
    files_dir: business-intelligence
    workspace_dir: /Users/renostars/reno-star-business-intelligent
    canvas: { x: 500, y: 50 }
    initial_prompt: |
      You just started as the Business Intelligence brain. Set up silently — do NOT contact agents yet.
      1. Read /workspace/CLAUDE.md to understand the automation hub
      2. Read your system prompt at /configs/system-prompt.md
      3. Use commit_memory to save current operational state
      4. You are now ready. Wait for the CEO to give you tasks.

    children:
      # ─── COORDINATOR ─────────────────────────────────────────
      - name: Coordinator
        role: >
          Day-to-day operations coordinator. Tracks progress, runs daily
          summaries, manages memory, handles routine checks.
        tier: 3
        model: opus
        files_dir: coordinator
        workspace_dir: /Users/renostars/reno-star-business-intelligent
        canvas: { x: 100, y: 250 }
        schedules:
          - name: Heartbeat (every 30m)
            cron_expr: "*/30 * * * *"
            prompt: |
              Lightweight heartbeat check. Read /configs/skills/heartbeat.md and follow its instructions.
            enabled: true
          - name: Memory Compactor (every 6h)
            cron_expr: "0 */6 * * *"
            prompt: |
              Review and compact memory files. Read /configs/skills/memory-compactor.md and follow its instructions.
            enabled: true
          - name: Daily Summary (9 PM Vancouver)
            cron_expr: "0 21 * * *"
            prompt: |
              Generate daily summary. Read /configs/skills/daily-summary.md and follow its instructions.
            enabled: true

      # ─── DEV LEADER ───────────────────────────────────────────
      - name: Dev Leader
        role: >
          Coordinates all technical work — website, automation, infrastructure.
          Manages Website Engineer and Automation Engineer.
        tier: 3
        model: opus
        files_dir: dev-leader
        canvas: { x: 300, y: 250 }
        children:
          - name: Website Engineer
            role: Builds and maintains reno-stars.com — Next.js 16, React 19, bilingual, SEO, performance.
            tier: 3
            model: opus
            files_dir: dev-leader/website-engineer
            workspace_dir: /Users/renostars/.openclaw/workspace/reno-stars-nextjs-prod
            canvas: { x: 250, y: 450 }
          - name: Automation Engineer
            role: Builds and maintains cron jobs, MCP tools, browser automation, email AI service.
            tier: 3
            model: opus
            files_dir: dev-leader/automation-engineer
            workspace_dir: /Users/renostars/reno-star-business-intelligent
            canvas: { x: 400, y: 450 }
            schedules:
              - name: Health Check (every 1h)
                cron_expr: "0 * * * *"
                prompt: |
                  System health check. Read /configs/skills/health-check.md and follow its instructions.
                enabled: true

      # ─── MARKETING LEADER ─────────────────────────────────────
      - name: Marketing Leader
        role: >
          Coordinates SEO, social media, and content creation.
          Manages SEO Specialist, Social Media Specialist, and Content Creator.
        tier: 3
        model: opus
        files_dir: marketing-leader
        canvas: { x: 550, y: 250 }
        children:
          - name: SEO Specialist
            role: Optimizes website for search engines. GSC, meta tags, structured data, GBP, Google Ads.
            tier: 3
            model: opus
            files_dir: marketing-leader/seo-specialist
            workspace_dir: /Users/renostars/.openclaw/workspace/reno-stars-nextjs-prod
            canvas: { x: 500, y: 450 }
            schedules:
              - name: SEO Builder (daily 6:17 AM)
                cron_expr: "17 6 * * *"
                prompt: Read /configs/skills/seo-builder.md and follow its instructions.
                enabled: true
              - name: SEO Weekly Report (Monday 8:03 AM)
                cron_expr: "3 8 * * 1"
                prompt: Read /configs/skills/seo-weekly-report.md and follow its instructions.
                enabled: true
          - name: Social Media Specialist
            role: Manages posting, engagement, and monitoring across 7+ platforms.
            tier: 3
            model: opus
            files_dir: marketing-leader/social-media-specialist
            canvas: { x: 650, y: 450 }
            schedules:
              - name: Social Media Poster (every 6h)
                cron_expr: "0 */6 * * *"
                prompt: Read /configs/skills/social-media-poster.md and follow its instructions.
                enabled: true
              - name: Social Media Monitor (every 30m)
                cron_expr: "*/30 * * * *"
                prompt: Read /configs/skills/social-media-monitor.md and follow its instructions.
                enabled: true
              - name: Social Media Engage (every 6h)
                cron_expr: "30 */6 * * *"
                prompt: Read /configs/skills/social-media-engage.md and follow its instructions.
                enabled: true
          - name: Content Creator
            role: Writes blog posts, Medium articles, Pinterest pins, video captions.
            files_dir: marketing-leader/content-creator
            canvas: { x: 800, y: 450 }

      # ─── SALES & CLIENT RELATIONS ─────────────────────────────
      - name: Sales & Client Relations
        role: >
          Coordinates client-facing operations — estimates, lead management,
          and client communication.
        tier: 3
        model: opus
        files_dir: sales-client-relations
        canvas: { x: 800, y: 250 }
        children:
          - name: Invoice Specialist
            role: Parses client requirements and builds renovation estimates using MCP invoice system.
            tier: 3
            model: opus
            files_dir: sales-client-relations/invoice-specialist
            workspace_dir: /Users/renostars/.openclaw/workspace/reno-star-invoice-automation
            canvas: { x: 950, y: 450 }
          - name: Lead Manager
            role: Handles email classification, lead tracking, follow-up sequences.
            files_dir: sales-client-relations/lead-manager
            workspace_dir: /Users/renostars/.openclaw/workspace/reno-star-email-ai-handle-service
            canvas: { x: 1100, y: 450 }
            schedules:
              - name: Email Classification Review (daily 9 AM)
                cron_expr: "0 9 * * *"
                prompt: Read /configs/skills/email-classification-review.md and follow its instructions.
                enabled: true

      # ─── ACCOUNTANT ───────────────────────────────────────────
      - name: Accountant
        role: Financial tracking, expense categorization, tax preparation, financial reporting.
        files_dir: accounting-leader
        canvas: { x: 1000, y: 250 }

      # ─── RESEARCH TEAM ────────────────────────────────────────
      - name: Research Team Lead
        role: Coordinates market research and technical research to inform business decisions.
        files_dir: research-team
        canvas: { x: 1200, y: 250 }
        children:
          - name: Market Analyst
            role: Researches renovation market — competitor analysis, pricing, directories.
            files_dir: research-team/market-analyst
            canvas: { x: 1200, y: 450 }
          - name: Technical Researcher
            role: Evaluates tools, platforms, and technologies for business improvement.
            files_dir: research-team/technical-researcher
            canvas: { x: 1350, y: 450 }
