name: Reno Stars Agent Team
description: >
  AI agent team for Reno Stars Construction Inc — a full-service renovation company
  in Greater Vancouver. Manages website, marketing, sales, accounting, and research
  operations through coordinated agent teams.

defaults:
  runtime: claude-code
  tier: 2
  auth_token_file: ""
  initial_prompt: |
    You just started. Set up silently — do NOT contact other agents yet.
    1. Read your system prompt at /configs/system-prompt.md
    2. Read /workspace/CLAUDE.md if it exists to understand the project
    3. Run: git log --oneline -5 in /workspace to see recent changes (if applicable)
    4. Use commit_memory to save a brief summary of your role and current state
    5. You are now ready. Wait for tasks from your manager.

workspaces:
  # ─── COORDINATOR (PM) ───────────────────────────────────────────
  - name: Coordinator
    role: >
      Central project manager. Delegates all work to team leaders,
      tracks progress, synthesizes reports, runs daily operations.
    tier: 3
    model: opus
    files_dir: coordinator
    workspace_dir: /Users/renostars/reno-star-business-intelligent
    canvas: { x: 400, y: 50 }
    initial_prompt: |
      You just started as Coordinator. Set up silently — do NOT contact agents yet.
      1. Read /workspace/CLAUDE.md to understand the automation hub
      2. Read your system prompt at /configs/system-prompt.md
      3. Check active crons: launchctl list | grep com.renostars
      4. Check pending verifications: cat /workspace/data/pending-verifications.json
      5. Use commit_memory to save current operational state
      6. You are now ready. Wait for the CEO to give you tasks.
    schedules:
      - name: Heartbeat (every 30m)
        cron_expr: "*/30 * * * *"
        prompt: |
          Lightweight heartbeat check. Read /configs/skills/heartbeat.md and follow its instructions.
          Rotate through checks: cron health, TODO review, git repos, cron logs, Chrome CDP, disk space, memory.
          Alert only on actionable issues via Telegram.
        enabled: true
      - name: Memory Compactor (every 6h)
        cron_expr: "0 */6 * * *"
        prompt: |
          Review and compact memory files. Read /configs/skills/memory-compactor.md and follow its instructions.
          Check for outdated info, duplicates, and gaps. Update from git logs of active projects.
          Keep MEMORY.md under 200 lines.
        enabled: true
      - name: Daily Summary (9 PM Vancouver)
        cron_expr: "0 21 * * *"
        prompt: |
          Generate daily summary. Read /configs/skills/daily-summary.md and follow its instructions.
          Gather: git commits, cron logs, social media posts, Dreamina videos, Vercel deployments, invoice activity.
          Check pending verifications. Send formatted summary to Telegram.
        enabled: true

    children:
      # ─── DEV LEADER ───────────────────────────────────────────
      - name: Dev Leader
        role: >
          Coordinates all technical work — website, automation, infrastructure.
          Manages Website Engineer and Automation Engineer.
        tier: 3
        model: opus
        files_dir: dev-leader
        canvas: { x: 150, y: 250 }

        children:
          - name: Website Engineer
            role: >
              Builds and maintains reno-stars.com — Next.js 16, React 19,
              bilingual (EN/ZH), SEO, structured data, performance.
            tier: 3
            model: opus
            files_dir: dev-leader/website-engineer
            workspace_dir: /Users/renostars/.openclaw/workspace/reno-stars-nextjs-prod
            canvas: { x: 50, y: 450 }
            initial_prompt: |
              You just started as Website Engineer. Set up silently.
              1. Read /workspace/CLAUDE.md for architecture and commands
              2. Read your system prompt at /configs/system-prompt.md
              3. Run: git log --oneline -5 to see recent changes
              4. Run: pnpm typecheck to verify build health
              5. Use commit_memory to save current state
              6. Ready for tasks from Dev Leader.

          - name: Automation Engineer
            role: >
              Builds and maintains cron jobs, MCP tools, browser automation,
              email AI service, and infrastructure tooling.
            tier: 3
            model: opus
            files_dir: dev-leader/automation-engineer
            workspace_dir: /Users/renostars/reno-star-business-intelligent
            canvas: { x: 250, y: 450 }
            initial_prompt: |
              You just started as Automation Engineer. Set up silently.
              1. Read /workspace/CLAUDE.md for the automation hub structure
              2. Read your system prompt at /configs/system-prompt.md
              3. Check cron health: launchctl list | grep com.renostars
              4. Check recent cron logs: tail -3 /workspace/data/cron-logs/*.jsonl
              5. Use commit_memory to save current state
              6. Ready for tasks from Dev Leader.
            schedules:
              - name: Health Check (every 1h)
                cron_expr: "0 * * * *"
                prompt: |
                  System health check. Read /configs/skills/health-check.md and follow its instructions.
                  7 checks with auto-fix: launchd crons, Chrome CDP, MCP servers, cron logs, git repos, disk space.
                  Report issues via Telegram. Auto-fix what you can.
                enabled: true

      # ─── MARKETING LEADER ─────────────────────────────────────
      - name: Marketing Leader
        role: >
          Coordinates SEO, social media, and content creation.
          Manages SEO Specialist, Social Media Specialist, and Content Creator.
        tier: 3
        model: opus
        files_dir: marketing-leader
        canvas: { x: 400, y: 250 }

        children:
          - name: SEO Specialist
            role: >
              Optimizes website for search engines. GSC analysis, meta tags,
              structured data, indexing, content optimization, GBP, Google Ads.
            files_dir: marketing-leader/seo-specialist
            workspace_dir: /Users/renostars/.openclaw/workspace/reno-stars-nextjs-prod
            canvas: { x: 300, y: 450 }
            schedules:
              - name: SEO Builder (daily 6:17 AM Vancouver)
                cron_expr: "17 6 * * *"
                prompt: |
                  Daily SEO audit and optimization. Read /configs/skills/seo-builder.md and follow its instructions.
                  Check MODE GATE in seo-builder-mode.json. Batch optimize qualifying pages.
                  Submit to Google Indexing API. Send report via Telegram.
                enabled: true
              - name: SEO Weekly Report (Monday 8:03 AM Vancouver)
                cron_expr: "3 8 * * 1"
                prompt: |
                  Weekly SEO report. Read /configs/skills/seo-weekly-report.md and follow its instructions.
                  GSC week-over-week comparison, business profile analytics, local rank tracker.
                  Send comprehensive report via Telegram.
                enabled: true

          - name: Social Media Specialist
            role: >
              Manages posting, engagement, and monitoring across 7+ platforms.
              Share don't advertise philosophy.
            files_dir: marketing-leader/social-media-specialist
            canvas: { x: 400, y: 450 }
            schedules:
              - name: Social Media Poster (every 6h)
                cron_expr: "0 */6 * * *"
                prompt: |
                  Draft and publish social media posts. Read /configs/skills/social-media-poster.md and follow its instructions.
                  Phase 0: trend research. Phase 0.7: Dreamina video (every 2 days). Phase 1: publish approved.
                  Phase 2: draft new content. Phase 6: self-improvement. Send drafts to Telegram for approval.
                enabled: true
              - name: Social Media Monitor (every 30m)
                cron_expr: "*/30 * * * *"
                prompt: |
                  Monitor social media. Read /configs/skills/social-media-monitor.md and follow its instructions.
                  Check DMs/replies across platforms. Process Telegram approvals. Classify leads (HOT/WARM/GENERAL).
                  Send consolidated notification.
                enabled: true
              - name: Social Media Engage (every 6h)
                cron_expr: "30 */6 * * *"
                prompt: |
                  Search and engage on social platforms. Read /configs/skills/social-media-engage.md and follow its instructions.
                  Find relevant posts, draft 5-8 replies per run. Send for Telegram approval. Post approved replies.
                  Platforms: TikTok, YouTube, Instagram, LinkedIn, X, Facebook. Reddit PAUSED until 2026-04-21.
                enabled: true

          - name: Content Creator
            role: >
              Writes blog posts, Medium articles, Pinterest pins, video captions,
              and marketing copy. Truthful content only.
            files_dir: marketing-leader/content-creator
            canvas: { x: 500, y: 450 }

      # ─── SALES & CLIENT RELATIONS ─────────────────────────────
      - name: Sales & Client Relations
        role: >
          Coordinates client-facing operations — estimates, lead management,
          and client communication.
        tier: 3
        model: opus
        files_dir: sales-client-relations
        canvas: { x: 650, y: 250 }

        children:
          - name: Invoice Specialist
            role: >
              Parses client requirements and builds renovation estimates
              using the MCP invoice system. Publishes to InvoiceSimple.
            tier: 3
            model: opus
            files_dir: sales-client-relations/invoice-specialist
            workspace_dir: /Users/renostars/.openclaw/workspace/reno-star-invoice-automation
            canvas: { x: 600, y: 450 }
            initial_prompt: |
              You just started as Invoice Specialist. Set up silently.
              1. Read /workspace/CLAUDE.md for MCP system architecture
              2. Read your system prompt at /configs/system-prompt.md
              3. Run: npm test to verify system health
              4. Use commit_memory to save current state
              5. Ready for tasks from Sales & Client Relations.

          - name: Lead Manager
            role: >
              Handles email classification, lead tracking, follow-up sequences,
              and CRM operations via the email AI service.
            files_dir: sales-client-relations/lead-manager
            workspace_dir: /Users/renostars/.openclaw/workspace/reno-star-email-ai-handle-service
            canvas: { x: 700, y: 450 }
            schedules:
              - name: Email Classification Review (daily 9 AM Vancouver)
                cron_expr: "0 9 * * *"
                prompt: |
                  Review email classifications. Read /configs/skills/email-classification-review.md and follow its instructions.
                  Check last 24h classifications. Flag misclassifications. Backfill missed leads.
                  Report findings via Telegram.
                enabled: true

      # ─── ACCOUNTING LEADER ────────────────────────────────────
      - name: Accounting Leader
        role: >
          Financial tracking, expense categorization, tax preparation,
          and financial reporting for Reno Stars Construction Inc.
        files_dir: accounting-leader
        canvas: { x: 800, y: 250 }

      # ─── RESEARCH TEAM ────────────────────────────────────────
      - name: Research Team Lead
        role: >
          Coordinates market research and technical research to inform
          business decisions.
        files_dir: research-team
        canvas: { x: 200, y: 250 }

        children:
          - name: Market Analyst
            role: >
              Researches the renovation market — competitor analysis,
              pricing trends, directory opportunities, customer behavior.
            files_dir: research-team/market-analyst
            canvas: { x: 100, y: 450 }

          - name: Technical Researcher
            role: >
              Evaluates tools, platforms, and technologies for business
              improvement — AI services, construction tech, marketing tools.
            files_dir: research-team/technical-researcher
            canvas: { x: 200, y: 450 }
