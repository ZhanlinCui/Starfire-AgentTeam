name: Reno Stars Agent Team
description: >
  AI agent team for Reno Stars Construction Inc — a full-service renovation company
  in Greater Vancouver. Compact 6-agent team optimized for 8GB Mac Mini.

defaults:
  runtime: claude-code
  tier: 3
  model: opus
  initial_prompt: |
    You just started. Set up silently — do NOT contact other agents yet.
    1. Read your system prompt at /configs/system-prompt.md — this defines YOUR role
    2. Read /workspace/CLAUDE.md if it exists to understand the project
    3. Run: git log --oneline -5 in /workspace to see recent changes (if applicable)
    4. Use commit_memory to save a brief summary of your role and current state
    5. IMPORTANT: You do the work yourself. Do NOT delegate to other agents unless your system prompt explicitly says to delegate. Most agents are hands-on workers.
    6. You are now ready. Wait for tasks from your manager.

workspaces:
  # ─── BUSINESS INTELLIGENCE (Root) ───────────────────────────────
  - name: Business Intelligence
    role: >
      Central AI brain. Receives tasks from the CEO, delegates to team,
      synthesizes results.
    files_dir: business-intelligence
    workspace_dir: /Users/renostars/reno-star-business-intelligent
    canvas: { x: 400, y: 50 }
    initial_prompt: |
      You just started as the Business Intelligence brain. Set up silently.
      1. Read /workspace/CLAUDE.md to understand the automation hub
      2. Read your system prompt at /configs/system-prompt.md
      3. Use commit_memory to save current operational state
      4. You are now ready. Wait for the CEO to give you tasks.

    children:
      # ─── COORDINATOR ─────────────────────────────────────────
      - name: Coordinator
        role: Day-to-day ops — daily summaries, health checks, memory, progress tracking.
        files_dir: coordinator
        workspace_dir: /Users/renostars/reno-star-business-intelligent
        canvas: { x: 100, y: 250 }
        schedules:
          - name: Heartbeat (every 30m)
            cron_expr: "*/30 * * * *"
            prompt: Read /configs/skills/heartbeat.md and follow its instructions.
            enabled: true
          - name: Memory Compactor (every 6h)
            cron_expr: "0 */6 * * *"
            prompt: Read /configs/skills/memory-compactor.md and follow its instructions.
            enabled: true
          - name: Daily Summary (9 PM Vancouver)
            cron_expr: "0 21 * * *"
            prompt: Read /configs/skills/daily-summary.md and follow its instructions.
            enabled: true

      # ─── DEV LEADER (website + automation + infra) ────────────
      - name: Dev Leader
        role: >
          ALL technical work — website (Next.js), automation (crons, MCP),
          browser automation, email AI service, infrastructure.
        files_dir: dev-leader
        workspace_dir: /Users/renostars/reno-star-business-intelligent
        canvas: { x: 300, y: 250 }
        schedules:
          - name: Health Check (every 1h)
            cron_expr: "0 * * * *"
            prompt: Read /configs/skills/health-check.md and follow its instructions.
            enabled: true

      # ─── MARKETING LEADER (SEO + social + content) ────────────
      - name: Marketing Leader
        role: >
          ALL marketing — SEO, social media (8 platforms), content creation,
          Google Ads, business profiles, engagement, monitoring.
        files_dir: marketing-leader
        workspace_dir: /Users/renostars/reno-star-business-intelligent
        canvas: { x: 500, y: 250 }
        schedules:
          - name: SEO Builder (daily 6:17 AM)
            cron_expr: "17 6 * * *"
            prompt: Read /configs/skills/seo-builder.md and follow its instructions.
            enabled: true
          - name: SEO Weekly Report (Monday 8:03 AM)
            cron_expr: "3 8 * * 1"
            prompt: Read /configs/skills/seo-weekly-report.md and follow its instructions.
            enabled: true
          - name: Social Media Poster (every 6h)
            cron_expr: "0 */6 * * *"
            prompt: Read /configs/skills/social-media-poster.md and follow its instructions.
            enabled: true
          - name: Social Media Monitor (every 30m)
            cron_expr: "*/30 * * * *"
            prompt: Read /configs/skills/social-media-monitor.md and follow its instructions.
            enabled: true
          - name: Social Media Engage (every 6h)
            cron_expr: "30 */6 * * *"
            prompt: Read /configs/skills/social-media-engage.md and follow its instructions.
            enabled: true

      # ─── SALES & CLIENT RELATIONS (invoices + leads) ──────────
      - name: Sales & Client Relations
        role: >
          ALL client-facing ops — estimates/invoices (MCP system),
          lead management, email classification, follow-ups.
        files_dir: sales-client-relations
        workspace_dir: /Users/renostars/.openclaw/workspace/reno-star-invoice-automation
        canvas: { x: 650, y: 250 }
        schedules:
          - name: Email Classification Review (daily 9 AM)
            cron_expr: "0 9 * * *"
            prompt: Read /configs/skills/email-classification-review.md and follow its instructions.
            enabled: true

      # ─── ACCOUNTANT ───────────────────────────────────────────
      - name: Accountant
        role: Financial tracking, expense categorization, tax preparation, financial reporting.
        files_dir: accounting-leader
        canvas: { x: 800, y: 250 }

