# Free Beats All — Zero-cost AI agent team
#
# Each agent uses a DIFFERENT free LLM provider to spread rate limits.
# All providers have per-minute rate limits (not per-day), so the retry
# logic in the SDK executor handles temporary 429s automatically.
#
# Provider breakdown:
#   PM           → Groq (Llama 3.3 70B) — 30 RPM, fast inference
#   Dev Lead     → OpenRouter (free models) — 20 RPM, wide model selection
#   FE           → Cerebras (Llama 3.3 70B) — 30 RPM, ultra-fast
#   BE           → Groq (Qwen3 32B) — 30 RPM, good at code
#   QA           → OpenRouter (free models) — 20 RPM
#
# Total cost: $0/month. Rate limits handled by retry with backoff.
#
# API keys needed (all free, no credit card):
#   GROQ_API_KEY       — https://console.groq.com/keys
#   OPENROUTER_API_KEY — https://openrouter.ai/keys
#   CEREBRAS_API_KEY   — https://cloud.cerebras.ai/

name: Free Beats All
description: Zero-cost AI agent team using free LLM providers (Groq, OpenRouter, Cerebras)

defaults:
  runtime: langgraph
  tier: 2

  initial_prompt: |
    You just started. Set up your environment silently — do NOT contact other agents yet.
    1. Clone the repo: git clone https://github.com/${GITHUB_REPO}.git /workspace/repo 2>/dev/null || (cd /workspace/repo && git pull)
    2. Set up git hooks: cd /workspace/repo && git config core.hooksPath .githooks
    3. Read /workspace/repo/CLAUDE.md to understand the project
    4. Read your system prompt at /configs/system-prompt.md to understand your role
    5. You are now ready. Wait for tasks from your parent — do not initiate contact.

workspaces:
  - name: PM
    role: Project Manager — coordinates Dev team
    tier: 3
    model: groq:llama-3.3-70b-versatile
    files_dir: pm
    canvas: { x: 400, y: 50 }
    children:
      - name: Dev Lead
        role: Engineering coordinator — delegates to FE, BE, QA
        tier: 3
        model: openrouter:meta-llama/llama-3.3-70b-instruct:free
        files_dir: dev-lead
        canvas: { x: 600, y: 200 }
        children:
          - name: Frontend Engineer
            role: React/Next.js, React Flow, Zustand, Tailwind CSS
            tier: 3
            model: groq:qwen-qwq-32b
            files_dir: frontend-engineer
            canvas: { x: 400, y: 350 }
          - name: Backend Engineer
            role: Go platform, Postgres, Redis, A2A protocol
            tier: 3
            model: groq:llama-3.3-70b-versatile
            files_dir: backend-engineer
            canvas: { x: 600, y: 350 }
          - name: QA Engineer
            role: Testing, quality assurance, test automation
            tier: 3
            model: openrouter:deepseek/deepseek-r1:free
            files_dir: qa-engineer
            canvas: { x: 800, y: 350 }
