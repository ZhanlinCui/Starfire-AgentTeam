# Render deployment configuration for Starfire
# Deploy with one click: https://render.com/deploy
#
# This file provisions:
#   - platform   (Go API server)
#   - canvas     (Next.js frontend)
#   - postgres   (managed Postgres 16)
#   - redis      (managed Redis 7)
#
# Required: set SECRETS_ENCRYPTION_KEY in the Render dashboard after first deploy.
# Generate: openssl rand -base64 32

services:
  # ── Go Platform API ────────────────────────────────────────────────────────
  - type: web
    name: starfire-platform
    runtime: docker
    dockerfilePath: ./platform/Dockerfile
    dockerContext: ./platform
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        fromDatabase:
          name: starfire-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: starfire-redis
          type: redis
          property: connectionString
      - key: PLATFORM_URL
        # Set this to your platform's public Render URL after first deploy,
        # e.g. https://starfire-platform.onrender.com
        value: "https://starfire-platform.onrender.com"
      - key: CORS_ORIGINS
        # Set to your canvas public URL after first deploy
        value: "https://starfire-canvas.onrender.com"
      - key: RATE_LIMIT
        value: "500"
      - key: SECRETS_ENCRYPTION_KEY
        # REQUIRED: set this in Render dashboard → Environment
        # Generate: openssl rand -base64 32
        generateValue: true
      - key: ACTIVITY_RETENTION_DAYS
        value: "7"

  # ── Next.js Canvas ─────────────────────────────────────────────────────────
  - type: web
    name: starfire-canvas
    runtime: docker
    dockerfilePath: ./canvas/Dockerfile
    dockerContext: ./canvas
    plan: starter
    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_PLATFORM_URL
        fromService:
          name: starfire-platform
          type: web
          property: host
          envVarKey: NEXT_PUBLIC_PLATFORM_URL
      - key: NEXT_PUBLIC_WS_URL
        # Render web services are HTTPS/WSS by default
        value: "wss://starfire-platform.onrender.com/ws"

  # ── Redis ──────────────────────────────────────────────────────────────────
  - type: redis
    name: starfire-redis
    plan: starter
    maxmemoryPolicy: noeviction

databases:
  # ── Postgres 16 ────────────────────────────────────────────────────────────
  - name: starfire-postgres
    plan: starter
    databaseName: agentmolecule
    user: starfire
    postgresMajorVersion: 16
