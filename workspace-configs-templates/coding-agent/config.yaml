name: Coding Agent
description: A full-stack coding agent that can read, write, and execute code. Drop-in replacement for OpenClaw/Claude Code style agents.
version: 1.0.0
tier: 2

model: anthropic:claude-sonnet-4-6

skills:
  - code-generation
  - code-review
  - debug-assist
  - shell-exec

tools:
  - web_search
  - filesystem

a2a:
  port: 8000
  streaming: true
  push_notifications: true

delegation:
  retry_attempts: 3
  retry_delay: 5
  timeout: 300
  escalate: true

sub_workspaces: []

env:
  required:
    - ANTHROPIC_API_KEY
  optional:
    - GITHUB_TOKEN
    - OPENAI_API_KEY
