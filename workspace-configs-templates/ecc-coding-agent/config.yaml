name: ECC Coding Agent
description: Everything Claude Code — production-ready coding agent with 10 specialized skills, TDD, security review, and deep research. Based on github.com/affaan-m/everything-claude-code.
version: 1.9.0
tier: 2

model: anthropic:claude-sonnet-4-6

# Load ECC's core prompt files in order
prompt_files:
  - CLAUDE.md
  - AGENTS.md
  - WORKING-CONTEXT.md

skills:
  - coding-standards
  - tdd-workflow
  - e2e-testing
  - security-review
  - api-design
  - backend-patterns
  - frontend-patterns
  - deep-research
  - shell-exec

tools:
  - web_search
  - filesystem

a2a:
  port: 8000
  streaming: true
  push_notifications: true

delegation:
  retry_attempts: 3
  retry_delay: 5
  timeout: 300
  escalate: true

sub_workspaces: []

env:
  required:
    - ANTHROPIC_API_KEY
  optional:
    - GITHUB_TOKEN
    - OPENAI_API_KEY
