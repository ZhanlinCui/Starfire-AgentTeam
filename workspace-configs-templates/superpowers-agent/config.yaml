name: Superpowers Agent
description: obra/superpowers — Zero-dependency coding agent with 14 battle-tested skills including TDD, systematic debugging, parallel agents, code review, brainstorming, and git worktrees.
version: 1.0.0
tier: 2

model: anthropic:claude-sonnet-4-6

prompt_files:
  - CLAUDE.md

skills:
  - test-driven-development
  - systematic-debugging
  - writing-plans
  - executing-plans
  - dispatching-parallel-agents
  - subagent-driven-development
  - requesting-code-review
  - receiving-code-review
  - verification-before-completion
  - finishing-a-development-branch
  - using-git-worktrees
  - brainstorming
  - writing-skills
  - using-superpowers
  - shell-exec
  - file-ops

tools:
  - web_search
  - filesystem

a2a:
  port: 8000
  streaming: true
  push_notifications: true

delegation:
  retry_attempts: 3
  retry_delay: 5
  timeout: 300
  escalate: true

sub_workspaces: []

env:
  required:
    - ANTHROPIC_API_KEY
  optional:
    - GITHUB_TOKEN
