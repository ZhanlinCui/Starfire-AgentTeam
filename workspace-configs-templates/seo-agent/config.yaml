name: SEO Agent
description: Generates and audits SEO-optimized landing pages with keyword research and content scoring.
version: 1.0.0
tier: 1

model: anthropic:claude-sonnet-4-6

skills:
  - generate-seo-page
  - audit-seo-page

tools:
  - web_search

a2a:
  port: 8000
  streaming: true
  push_notifications: true

delegation:
  retry_attempts: 3
  retry_delay: 5
  timeout: 120
  escalate: true

sub_workspaces: []

env:
  required:
    - ANTHROPIC_API_KEY
  optional:
    - SERP_API_KEY
